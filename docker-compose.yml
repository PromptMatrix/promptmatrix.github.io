version: '3.8'

services:
  promptmatrix:
    build: .
    container_name: promptmatrix-engine
    ports:
      - "8000:8000"
    volumes:
      # Mount the database locally so prompt history is preserved on container restart
      - ./data:/app/data
    environment:
      # Set to "production" for multi-user authentication, "development" for local single-user access
      - APP_ENV=${APP_ENV:-development}
      # REQUIRED: Generate strong secrets before first run:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      # Then set via: export JWT_SECRET_KEY=<value> before running docker compose up
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set - see .env.example}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set - see .env.example}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/promptmatrix.db}
    # NOTE: Single worker required. In-memory rate limiting and caching are
    # per-process. Multiple workers will produce inconsistent behavior.
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1"
    restart: unless-stopped
