name: Evaluate Prompts CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'prompts/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run Rule-Based Eval on All Prompts
        env:
          PM_URL: ${{ secrets.PM_URL }}
          PM_TOKEN: ${{ secrets.PM_TOKEN }}
        run: |
          # Guard: skip entirely if PM_URL secret is not configured
          # (prevents failures in forks and the public OSS repo itself)
          if [ -z "$PM_URL" ]; then
            echo "PM_URL secret not set — skipping eval (configure PM_URL and PM_TOKEN to enable)"
            exit 0
          fi

          # Guard: skip if no prompt files exist
          shopt -s nullglob
          prompt_files=(prompts/*.txt)
          shopt -u nullglob

          if [ ${#prompt_files[@]} -eq 0 ]; then
            echo "No prompt files found in prompts/ — skipping eval"
            exit 0
          fi

          echo "Found ${#prompt_files[@]} prompt file(s) to evaluate"
          FAILED=0

          for file in "${prompt_files[@]}"; do
            key=$(basename "$file" .txt)
            echo "──────────────────────────────────────────"
            echo "Evaluating: $key ($file)"
            if python pmx.py --url "$PM_URL" eval "$key" "$file" --type rule_based; then
              echo "✓ $key — PASSED"
            else
              echo "✗ $key — FAILED (exit $?)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "──────────────────────────────────────────"
          echo "Eval complete: $((${#prompt_files[@]} - FAILED))/${#prompt_files[@]} passed"

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED prompt(s) failed eval scoring. Review output above."
            exit 1
          fi

      # Optional: LLM-as-Judge eval (uncomment and configure ANTHROPIC_API_KEY secret)
