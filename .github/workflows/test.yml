name: PromptMatrix CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup environment
      run: |
        cp .env.example .env
        sed -i 's/change-me-to-a-random-secret/ci-test-secret-key-123/g' .env
        sed -i 's/ENCRYPTION_KEY=/ENCRYPTION_KEY=ci-test-encryption-key-1234/g' .env
        
    - name: Run migrations
      run: alembic upgrade head
      
    - name: Run Tests
      run: pytest -v
